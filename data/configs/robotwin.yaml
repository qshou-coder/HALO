RoboTwin:
  dataset_names:
  - robotwin_data
  image_transform_args:
    image_stride: 16
    max_image_size: 1024
    min_image_size: 512
  vit_image_transform_args:
    image_stride: 14
    max_image_size: 980
    min_image_size: 378
  is_mandatory: true
  shuffle_lines: True
  shuffle_seed: 0
  img_aug: true
  use_subtask: false
  use_goal_image: false
  test_mm_act: false
  num_used_data:
  - -1
  weight: 4

llava_next_data:
  dataset_names:
  - llava_next
  image_transform_args:
    image_stride: 14
    max_image_size: 980
    min_image_size: 378
    max_pixels: 2_007_040
  is_mandatory: true
  num_used_data: # The sum should be larger than NUM_GPUS x NUM_WORKERS
  - 312
  weight: 1
